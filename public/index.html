<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI감정분석 프로젝트</title>
  <!-- 작성한 CSS 연결 -->
  <link rel="stylesheet" href="./css/style.css" />

  <!-- 가독성을 위해 구글 폰트 적용 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- 상단 네비게이션 헤더 -->
  <header class="header">
    <a href="/" class="header-logo">AI Sentiment</a>
    <nav class="header-nav">
      <a href="#">서비스 소개</a>
      <a href="#">사용 방법</a>
    </nav>
  </header>

  <main class="main-content">

    <!-- 1. 타이틀과 설명을 보여주는 히어로 섹션 -->
    <section class="hero">
      <h1>AI 감성 분석 서비스</h1>
      <p>텍스트를 입력하면 AI가 문장의 감성을 긍정, 부정, 중립으로 분석합니다.</p>
    </section>

    <!-- 2. 입력을 받는 카드 폼 -->
    <section class="card">
      <div class="textarea-container">
        <!-- textarea 입력창 -->
        <textarea id="sentimentText" placeholder="분석하고 싶은 문장을 입력하세요. 예: 오늘 서비스가 정말 만족스러웠어요."></textarea>
        <!-- 실시간 글자수 표시 -->
        <div class="char-count" id="charCount">0 / 1000</div>
      </div>

      <!-- 에러 시 메시지 표시 (기본 숨김) -->
      <div class="error-message" id="errorMessage"></div>

      <!-- 감성 분석 실행 버튼 -->
      <button class="button-primary" id="analyzeButton">감성분석</button>
    </section>

    <!-- 3. 하단 안내 카드 3종 -->
    <section class="info-cards">
      <div class="info-card">
        <h3 class="positive-title">긍정 분석</h3>
        <p>만족, 기대, 칭찬, 호의적인 표현을 감지합니다.</p>
      </div>
      <div class="info-card">
        <h3 class="negative-title">부정 분석</h3>
        <p>불만, 실망, 분노, 비판적인 표현을 감지합니다.</p>
      </div>
      <div class="info-card">
        <h3 class="neutral-title">중립 분석</h3>
        <p>감정 표현이 약하거나 정보 전달 중심의 문장을 분류합니다.</p>
      </div>
    </section>

  </main>

  <!-- 4. 결과를 보여주는 모달 (평소엔 투명화) -->
  <div class="modal-backdrop" id="resultModalBackdrop">
    <div class="modal" id="resultModal">
      <div class="modal-header">
        <h2>분석 결과</h2>
        <button class="btn-close" id="modalCloseButton">&times;</button>
      </div>

      <div class="modal-body">
        <div class="result-emoji" id="resultEmoji">✨</div>
        <div id="resultLabel">결과</div>
        <div id="resultConfidence">신뢰도 -%</div>

        <div class="divider"></div>

        <div id="resultReason">분석 이유가 표시됩니다.</div>
      </div>

      <button class="button-primary btn-confirm" id="modalConfirmButton">확인</button>
    </div>
  </div>

  <!-- JavaScript 동작 연결 -->
  <script src="./js/app.js"></script>
</body>

</html>
